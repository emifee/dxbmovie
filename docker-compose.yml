# DXBmovies.Ai — Docker Compose for local container runs.
#
#   docker compose up --build      # build image + start
#   docker compose up -d           # start detached
#   docker compose down            # stop + remove
#
# Env vars are read from a local .env.local file (copy .env.example).
# On the Oracle server, set these via: export VAR=value (or a .env file).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: dxbmovies-ai:latest
    container_name: dxbmovies-ai
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      MONGODB_URI: ${MONGODB_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
