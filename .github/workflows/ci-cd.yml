name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build (standalone)
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: https://dxbmovie.online
          MONGODB_URI: mongodb://localhost:27017/ci
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          TMDB_API_KEY: ci-tmdb-key
          GROQ_API_KEY: ci-groq-key
          OPENAI_API_KEY: ci-openai-key
          ANTHROPIC_API_KEY: ci-anthropic-key
          ELEVENLABS_API_KEY: ci-elevenlabs-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BHk6yCQG5NPN_naid9aD76QrW_mp8fubC5l6vRhvoGLSTPfXH-PymD1pz2fxyzPTy28DRh5cN-zrW6-B_zfGa-Y
          VAPID_PRIVATE_KEY: kkmrq70vuaQHZnCkj_KtIBfYyfa6NqV-yVUESzb4L_w
          VAPID_EMAIL: mailto:hello@dxbmovies.com
          CRON_SECRET: ci-cron-secret
        run: npm run build

      # Bundle standalone output + static assets + public into a tarball
      - name: Package standalone bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Upload deploy bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: Checkout for ecosystem config
        uses: actions/checkout@v4

      - name: Copy bundle and config to Oracle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz,ecosystem.config.js"
          target: /home/ubuntu/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            # Extract new build into a fresh directory, then swap atomically
            rm -rf /home/ubuntu/app-next
            mkdir -p /home/ubuntu/app-next
            tar -xzf /home/ubuntu/deploy.tar.gz -C /home/ubuntu/app-next
            # Copy .env.local from current deploy
            cp /home/ubuntu/dxbmovies/.env.local /home/ubuntu/app-next/.env.local
            # Swap directories
            rm -rf /home/ubuntu/dxbmovies-old
            mv /home/ubuntu/dxbmovies /home/ubuntu/dxbmovies-old 2>/dev/null || true
            mv /home/ubuntu/app-next /home/ubuntu/dxbmovies
            cp /home/ubuntu/ecosystem.config.js /home/ubuntu/dxbmovies/ecosystem.config.js
            # Restart app using standalone server (no npm install needed)
            pm2 restart dxbmovies || pm2 start /home/ubuntu/dxbmovies/ecosystem.config.js
            pm2 save
            echo "Deploy complete"
