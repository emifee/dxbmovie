name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: https://dxbmovie.online
          MONGODB_URI: mongodb://localhost:27017/ci
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          TMDB_API_KEY: ci-tmdb-key
          GROQ_API_KEY: ci-groq-key
          OPENAI_API_KEY: ci-openai-key
          ANTHROPIC_API_KEY: ci-anthropic-key
          ELEVENLABS_API_KEY: ci-elevenlabs-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BHk6yCQG5NPN_naid9aD76QrW_mp8fubC5l6vRhvoGLSTPfXH-PymD1pz2fxyzPTy28DRh5cN-zrW6-B_zfGa-Y
          VAPID_PRIVATE_KEY: kkmrq70vuaQHZnCkj_KtIBfYyfa6NqV-yVUESzb4L_w
          VAPID_EMAIL: mailto:hello@dxbmovies.com
          CRON_SECRET: ci-cron-secret
        run: npm run build

      # ── Deploy: only on push to main when secrets are set ──────────────────
      - name: Copy .next to Oracle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          # Ship everything except node_modules, .env, .git, and build cache
          source: ".next/,public/,package.json,package-lock.json,next.config.js"
          target: /home/ubuntu/dxbmovies
          rm: false
          strip_components: 0

      - name: Restart app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/dxbmovies
            npm ci --omit=dev --prefer-offline 2>&1 | tail -3
            pm2 restart dxbmovies || pm2 start npm --name dxbmovies -- start
            pm2 status dxbmovies
