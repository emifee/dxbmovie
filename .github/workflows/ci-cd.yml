name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI: type-check + lint + build
  # Runs on every push and every PR targeting main.
  # The deploy job only runs after this passes AND only on pushes to main.
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Next.js build
        env:
          # Hard-coded stubs — safe placeholder values for CI build
          # Real values are only needed at runtime on the server
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: http://localhost:3000
          MONGODB_URI: mongodb://localhost:27017/ci
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          TMDB_API_KEY: ci-tmdb-key
          GROQ_API_KEY: ci-groq-key
          OPENAI_API_KEY: ci-openai-key
          ANTHROPIC_API_KEY: ci-anthropic-key
          ELEVENLABS_API_KEY: ci-elevenlabs-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BHk6yCQG5NPN_naid9aD76QrW_mp8fubC5l6vRhvoGLSTPfXH-PymD1pz2fxyzPTy28DRh5cN-zrW6-B_zfGa-Y
          VAPID_PRIVATE_KEY: ci-vapid-private
          VAPID_EMAIL: mailto:ci@example.com
          CRON_SECRET: ci-cron-secret
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # CD: SSH into Oracle Cloud and pull + rebuild + restart
  # Only runs when CI passes AND the event is a push to main (not a PR).
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/dxbmovies

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Installing dependencies ──"
            npm ci --omit=dev

            echo "── Building Next.js standalone ──"
            npm run build

            echo "── Restarting pm2 ──"
            pm2 restart dxbmovies || pm2 start npm --name dxbmovies -- start

            echo "── Done ──"
            pm2 status dxbmovies
