name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: https://dxbmovie.online
          MONGODB_URI: mongodb://localhost:27017/ci
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          TMDB_API_KEY: ci-tmdb-key
          GROQ_API_KEY: ci-groq-key
          OPENAI_API_KEY: ci-openai-key
          ANTHROPIC_API_KEY: ci-anthropic-key
          ELEVENLABS_API_KEY: ci-elevenlabs-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BHk6yCQG5NPN_naid9aD76QrW_mp8fubC5l6vRhvoGLSTPfXH-PymD1pz2fxyzPTy28DRh5cN-zrW6-B_zfGa-Y
          VAPID_PRIVATE_KEY: kkmrq70vuaQHZnCkj_KtIBfYyfa6NqV-yVUESzb4L_w
          VAPID_EMAIL: mailto:hello@dxbmovies.com
          CRON_SECRET: ci-cron-secret
        run: npm run build

      # Upload built .next (exclude cache + standalone — not needed at runtime)
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          retention-days: 1
          path: |
            .next
            !.next/cache
            !.next/standalone

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check deploy secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.ORACLE_HOST }}" ] || [ -z "${{ secrets.ORACLE_SSH_KEY }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "ORACLE secrets not set — skipping deploy"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifact
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Rsync .next to Oracle
        if: steps.secrets.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle.pem
          chmod 600 ~/.ssh/oracle.pem
          rsync -az --delete \
            -e "ssh -i ~/.ssh/oracle.pem -o StrictHostKeyChecking=no" \
            .next/ ubuntu@${{ secrets.ORACLE_HOST }}:/home/ubuntu/dxbmovies/.next/

      - name: Restart app
        if: steps.secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/dxbmovies
            git pull origin main
            sed -i 's|NEXTAUTH_URL=.*|NEXTAUTH_URL=https://dxbmovie.online|' .env.local
            pm2 restart dxbmovies || pm2 start npm --name dxbmovies -- start
            pm2 status dxbmovies
