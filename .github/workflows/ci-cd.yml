name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: https://dxbmovie.online
          MONGODB_URI: mongodb://localhost:27017/ci
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          TMDB_API_KEY: ci-tmdb-key
          GROQ_API_KEY: ci-groq-key
          OPENAI_API_KEY: ci-openai-key
          ANTHROPIC_API_KEY: ci-anthropic-key
          ELEVENLABS_API_KEY: ci-elevenlabs-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BHk6yCQG5NPN_naid9aD76QrW_mp8fubC5l6vRhvoGLSTPfXH-PymD1pz2fxyzPTy28DRh5cN-zrW6-B_zfGa-Y
          VAPID_PRIVATE_KEY: kkmrq70vuaQHZnCkj_KtIBfYyfa6NqV-yVUESzb4L_w
          VAPID_EMAIL: mailto:hello@dxbmovies.com
          CRON_SECRET: ci-cron-secret
        run: npm run build

      # Rsync built output + source directly to Oracle — no rebuild on server
      - name: Deploy to Oracle Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ORACLE_HOST != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle.pem
          chmod 600 ~/.ssh/oracle.pem

          # Sync source files (excl. node_modules/.next)
          rsync -az --delete \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/oracle.pem -o StrictHostKeyChecking=no" \
            ./ ubuntu@${{ secrets.ORACLE_HOST }}:/home/ubuntu/dxbmovies/

          # Sync built .next output (excluding cache)
          rsync -az --delete \
            --exclude='cache' \
            -e "ssh -i ~/.ssh/oracle.pem -o StrictHostKeyChecking=no" \
            .next/ ubuntu@${{ secrets.ORACLE_HOST }}:/home/ubuntu/dxbmovies/.next/

      - name: Restart app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ORACLE_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/dxbmovies
            npm ci --omit=dev --prefer-offline 2>&1 | tail -3
            pm2 restart dxbmovies || pm2 start npm --name dxbmovies -- start
            pm2 status dxbmovies
